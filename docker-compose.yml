version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: seedance_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seedance}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seedance_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: seedance_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 core.wsgi:application"
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - USE_POSTGRES=True
      - POSTGRES_DB=${POSTGRES_DB:-seedance}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_DEBUG=False
      - ALLOWED_HOSTS=*
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-uN23-Lp12_cRpytKey_For_Seedance_SaaS_2026=}
      - SEEDANCE_API_KEY=${SEEDANCE_API_KEY}
      - RUNWAY_API_KEY=${RUNWAY_API_KEY}
      - KLING_API_KEY=${KLING_API_KEY}
      - VEO_API_KEY=${VEO_API_KEY}
      - PIKA_API_KEY=${PIKA_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: ./backend
    container_name: seedance_celery
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - USE_POSTGRES=True
      - POSTGRES_DB=${POSTGRES_DB:-seedance}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-uN23-Lp12_cRpytKey_For_Seedance_SaaS_2026=}
      - SEEDANCE_API_KEY=${SEEDANCE_API_KEY}
      - RUNWAY_API_KEY=${RUNWAY_API_KEY}
      - KLING_API_KEY=${KLING_API_KEY}
      - VEO_API_KEY=${VEO_API_KEY}
      - PIKA_API_KEY=${PIKA_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: seedance_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume:
